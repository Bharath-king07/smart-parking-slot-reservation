<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Parking Slot</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    width:400px;
    background:white;
    margin:40px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    text-align:center;
    color:#069bff;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#069bff;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0077cc;
}

</style>

</head>

<body>

<div class="container">

<h2>Book Parking Slot</h2>

<form>

<input type="text" placeholder="Enter Name" required>

<input type="text" placeholder="Vehicle Number" required>

<select required>
<option>Select Vehicle Type</option>
<option>Bike</option>
<option>Car</option>
</select>

<input type="date" required>

<input type="time" required>

<select required>
<option>Select Slot</option>
<option>A1</option>
<option>A2</option>
<option>A3</option>
<option>B1</option>
<option>B2</option>
</select>

<button>Book Now</button>

</form>

</div>

</body>
</html>
