<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

h2{
    text-align:center;
    color:#069bff;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#069bff;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0077cc;
}

.info{
    text-align:center;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>Contact Us</h2>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Your Message"></textarea>

<button>Send Message</button>

</form>

<div class="info">

<p>Email : smartparking@gmail.com</p>

<p>Phone : +91 9876543210</p>

</div>

</div>

</body>
</html>
