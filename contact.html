<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Us | Smart Parking Slot Reservation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.60)),
url("https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

min-height:100vh;

}

/* Header */

header{

background:rgba(0,0,0,.35);

backdrop-filter:blur(10px);

display:flex;

justify-content:space-between;

align-items:center;

padding:15px 40px;

}

.logo{

color:white;

font-size:28px;

font-weight:bold;

}

nav{

display:flex;

gap:20px;

}

nav a{

text-decoration:none;

color:white;

padding:8px 15px;

border-radius:6px;

transition:.3s;

}

nav a:hover{

background:#1E88E5;

}

/* Contact Box */

.container{

width:90%;

max-width:1100px;

margin:50px auto;

display:flex;

gap:30px;

flex-wrap:wrap;

}

.left{

flex:1;

background:rgba(255,255,255,.15);

backdrop-filter:blur(12px);

padding:30px;

border-radius:20px;

color:white;

}

.right{

flex:1;

background:rgba(255,255,255,.15);

backdrop-filter:blur(12px);

padding:30px;

border-radius:20px;

color:white;

}

h2{

margin-bottom:20px;

}

.input-box{

margin-bottom:18px;

}

.input-box input,
.input-box textarea{

width:100%;

padding:14px;

border:none;

border-radius:8px;

outline:none;

font-size:15px;

}

textarea{

resize:none;

height:140px;

}

button{

width:100%;

padding:15px;

background:#1E88E5;

color:white;

font-size:18px;

border:none;

border-radius:8px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1565C0;

}

.info{

line-height:35px;

margin-top:15px;

font-size:17px;

}

.info i{

color:#FFD54F;

width:30px;

}

.footer{

text-align:center;

color:white;

padding:20px;

margin-top:20px;

}

</style>

</head>

<body>

<header>

🚗 Smart Parking

<h2>Send Us a Message</h2>

<form>

<div class="input-box">

<input type="text" placeholder="Your Name" required>

</div>

<div class="input-box">

<input type="email" placeholder="Your Email" required>

</div>

<div class="input-box">

<input type="text" placeholder="Subject" required>

</div>

<div class="input-box">

<textarea placeholder="Write your message..." required></textarea>

</div>

<button type="submit">

<i class="fa-solid fa-paper-plane"></i>

 Send Message

</button>

</form>

</div>

<div class="right">

<h2>Contact Information</h2>

<div class="info">

<p>

<i class="fa-solid fa-location-dot"></i>

Coimbatore, Tamil Nadu

</p>

<p>

<i class="fa-solid fa-phone"></i>

+91 9876543210

</p>

<p>

<i class="fa-solid fa-envelope"></i>

smartparking@gmail.com

</p>

<p>

<i class="fa-solid fa-clock"></i>

Open 24 × 7

</p>

<p>

<i class="fa-solid fa-car"></i>

500+ Parking Slots Available

</p>

</div>

<hr style="margin:20px 0;">

<h3>Follow Us</h3>

<div style="font-size:30px; margin-top:15px;">

<i class="fab fa-facebook" style="margin-right:20px;"></i>

<i class="fab fa-twitter" style="margin-right:20px;"></i>

<i class="fab fa-linkedin"></i>

</div>

</div>

</div>

<p>

</p>
