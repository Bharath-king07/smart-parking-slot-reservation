<!DOCTYPE html>
<html>

<head>
    <title>Login Page</title>

    <style>

        body{
            font-family: Arial;
            background-color: lightgray;
        }

        .login{
            width:300px;
            margin:100px auto;
            background:white;
            padding:20px;
            border:1px solid black;
        }

        input{
            width:100%;
            padding:8px;
            margin-top:5px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:10px;
            background:blue;
            color:white;
        }

    </style>

</head>

<body>

<div class="login">

    <h2>Login</h2>

    <form>

        <label>Username</label>
        <br>
        <input type="text">

        <label>Password</label>
        <br>
        <input type="password">

        <button>Login</button>

    </form>

</div>

</body>

</html>
