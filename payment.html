<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("https://images.unsplash.com/photo-1556740749-887f6717d7e4?auto=format&fit=crop&w=1600&q=80");

background-size:cover;
background-position:center;

}

.payment-box{

width:500px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(12px);

padding:35px;

border-radius:20px;

color:white;

box-shadow:0px 10px 30px rgba(0,0,0,.5);

}

.payment-box h2{

text-align:center;

margin-bottom:10px;

}

.payment-box p{

text-align:center;

margin-bottom:25px;

color:#ddd;

}

.summary{

background:rgba(255,255,255,.15);

padding:15px;

border-radius:10px;

margin-bottom:20px;

line-height:35px;

}

.summary span{

font-weight:bold;

color:#FFD54F;

}

.payment-method{

margin-bottom:20px;

}

.payment-method label{

display:block;

padding:10px;

cursor:pointer;

}

button{

width:100%;

padding:15px;

font-size:18px;

border:none;

border-radius:8px;

background:#1E88E5;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1565C0;

}

</style>

</head>

<body>

<div class="payment-box">

<h2>Payment</h2>

<p>Complete your parking reservation.</p>

<div class="summary">

<p>Selected Slot :
<span id="slot"></span></p>

<p>Parking Fee :
<span>₹100</span></p>

</div>

<div class="payment-method">

<label>

<input type="radio" name="pay" checked>

UPI

</label>

<label>

<input type="radio" name="pay">

Credit Card

</label>

<label>

<input type="radio" name="pay">

Debit Card

</label>

<label>

<input type="radio" name="pay">

Cash

</label>

</div>

<button onclick="payNow()">

Pay Now

</button>

</div>

<script>

document.getElementById("slot").innerHTML=
localStorage.getItem("slot");

function payNow(){

alert("Payment Successful");

window.location.href="success.html";

}

</script>

</body>
</html>
