<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Select Parking Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:40px auto;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    color:white;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    margin-bottom:30px;
}

.legend{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:30px;
}

.item{
    display:flex;
    align-items:center;
    gap:8px;
}

.box{
    width:20px;
    height:20px;
    border-radius:5px;
}

.available{
    background:#2ecc71;
}

.booked{
    background:#e74c3c;
}

.selected{
    background:#3498db;
}

.slots{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.slot{
    padding:20px;
    text-align:center;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.green{
    background:#2ecc71;
}

.red{
    background:#e74c3c;
    cursor:not-allowed;
}

.slot:hover.green{
    transform:scale(1.05);
}

button{

    width:100%;
    margin-top:35px;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#1E88E5;
    color:white;
    cursor:pointer;

}

button:hover{

    background:#1565C0;

}

</style>
</head>

<body>

<div class="container">

<h1>Select Your Parking Slot</h1>

<p>Choose any available parking slot.</p>

<div class="legend">

<div class="item">
<div class="box available"></div>
Available
</div>

<div class="item">
<div class="box booked"></div>
Booked
</div>

<div class="item">
<div class="box selected"></div>
Selected
</div>

</div>

<div class="slots">

<div class="slot green" onclick="selectSlot(this)">A1</div>
<div class="slot red">A2</div>
<div class="slot green" onclick="selectSlot(this)">A3</div>
<div class="slot green" onclick="selectSlot(this)">A4</div>

<div class="slot green" onclick="selectSlot(this)">B1</div>
<div class="slot green" onclick="selectSlot(this)">B2</div>
<div class="slot red">B3</div>
<div class="slot green" onclick="selectSlot(this)">B4</div>

<div class="slot green" onclick="selectSlot(this)">C1</div>
<div class="slot green" onclick="selectSlot(this)">C2</div>
<div class="slot green" onclick="selectSlot(this)">C3</div>
<div class="slot red">C4</div>

</div>

<button onclick="goPayment()">
Confirm Selected Slot
</button>

</div>

<script>

let selected=null;

function selectSlot(slot){

if(selected!=null){
selected.style.background="#2ecc71";
}

selected=slot;

slot.style.background="#3498db";

}

function goPayment(){

if(selected==null){

alert("Please select a parking slot.");

}
else{

localStorage.setItem("slot",selected.innerHTML);

window.location.href="payment.html";

}

}

</script>

</body>
</html>
