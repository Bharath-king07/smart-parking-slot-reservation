<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Successful</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("https://images.unsplash.com/photo-1506521781263-d8422e82f27a?auto=format&fit=crop&w=1600&q=80");

    background-size:cover;
    background-position:center;

}

.success-box{

    width:500px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(12px);

    padding:35px;

    border-radius:20px;

    color:white;

    text-align:center;

    box-shadow:0px 10px 30px rgba(0,0,0,.5);

}

.tick{

    font-size:70px;

    color:#00E676;

    margin-bottom:15px;

}

h2{

    margin-bottom:10px;

}

p{

    margin:10px 0;

    font-size:17px;

}

.details{

    margin:25px 0;

    background:rgba(255,255,255,.15);

    padding:20px;

    border-radius:10px;

    line-height:35px;

}

.details span{

    color:#FFD54F;

    font-weight:bold;

}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:8px;

    background:#1E88E5;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#1565C0;

}

</style>

</head>

<body>

<div class="success-box">

<div class="tick">
✅
</div>

<h2>Booking Successful!</h2>

<p>Your parking slot has been reserved successfully.</p>

<div class="details">

<p>
Booking ID :
<span id="bookingId"></span>
</p>

<p>
Parking Slot :
<span id="slot"></span>
</p>

<p>
Payment Status :
<span>Paid</span>
</p>

<p>
Status :
<span>Confirmed</span>
</p>

</div>

<button onclick="goHome()">

Back to Home

</button>

</div>

<script>

// Show selected parking slot
document.getElementById("slot").innerHTML =
localStorage.getItem("slot");

// Generate random booking ID
let booking = "BK" + Math.floor(Math.random()*100000);

document.getElementById("bookingId").innerHTML = booking;

// Go back to Home page
function goHome(){

window.location.href="index.html";

}

</script>

</body>
</html>
